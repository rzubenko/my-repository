<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMDB Filmu Ieteicējs</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #0d253f; color: white; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 450px; width: 100%; color: #333; }
        h2 { color: #01b4e4; text-align: center; margin-top: 0; }
        .question { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1em; }
        button { background-color: #90cea1; color: #0d253f; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button:hover { background-color: #01b4e4; color: white; }
        
        #result { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; display: none; text-align: center; border: 2px solid #90cea1; }
        #moviePoster { width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
        #movieTitle { font-size: 1.3em; font-weight: bold; margin: 10px 0 5px 0; color: #0d253f; }
        #movieOverview { font-size: 0.9em; color: #666; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 TMDB Ieteicējs</h2>
    
    <div class="question">
        <label>Izvēlies žanru:</label>
        <select id="genre">
            <option value="35">Komēdija (Priecīgs)</option>
            <option value="18">Drāma (Skumjš/Nopietns)</option>
            <option value="28">Action (Piedzīvojumi)</option>
            <option value="27">Šausmu filmas</option>
            <option value="878">Zinātniskā fantastika</option>
        </select>
    </div>

    <div class="question">
        <label>Valoda:</label>
        <select id="language">
            <option value="en-US">Angļu</option>
            <option value="lv-LV">Latviešu (ja pieejams)</option>
        </select>
    </div>

    <button onclick="fetchMovie()">Meklēt filmu</button>

    <div id="result">
        <strong>Mūsu ieteikums:</strong>
        <p id="movieTitle"></p>
        <img id="moviePoster" src="" alt="Plakāts">
        <p id="movieOverview"></p>
    </div>
</div>

<script>
    async function fetchMovie() {
        // !!! AIZSTĀJ ŠO AR SAVU REĀLO API ATSLĒGU !!!
        const apiKey = 'd9de971b5b42ae37a8c1e1b9df96b868'; 
        const genreId = document.getElementById('genre').value;
        const lang = document.getElementById('language').value;
        
        // TMDB Discover API URL
        const url = `https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&with_genres=${genreId}&language=${lang}&sort_by=popularity.desc`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.results && data.results.length > 0) {
                // Izvēlamies nejaušu filmu no pirmajiem 20 rezultātiem
                const randomIndex = Math.floor(Math.random() * Math.min(data.results.length, 20));
                const movie = data.results[randomIndex];

                // Aizpildām datus
                document.getElementById('movieTitle').innerText = movie.title;
                document.getElementById('movieOverview').innerText = movie.overview || "Apraksts nav pieejams.";
                
                const poster = document.getElementById('moviePoster');
                if (movie.poster_path) {
                    poster.src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                    poster.style.display = 'block';
                } else {
                    poster.style.display = 'none';
                }

                document.getElementById('result').style.display = 'block';
            } else {
                alert("Neko neatradām!");
            }
        } catch (error) {
            console.error("Kļūda:", error);
            alert("Neizdevās sazināties ar TMDB.");
        }
    }
</script>

</body>
</html>
